services:
    postgres:
        image: pgvector/pgvector:pg18
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-app}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
            POSTGRES_DB: ${POSTGRES_DB:-code_docs_assistant}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
            - ./postgres/init:/docker-entrypoint-initdb.d
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-code_docs_assistant}",
                ]
            interval: 5s
            timeout: 5s
            retries: 10

volumes:
    postgres_data:
